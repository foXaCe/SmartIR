name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Open / maintain Release PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release

  publish-assets:
    name: Build + upload zip
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Verify manifest version
        run: |
          MV=$(jq -r .version custom_components/smartir/manifest.json)
          [ "$MV" = "${{ needs.release-please.outputs.version }}" ] \
            || { echo "Manifest version $MV != release ${{ needs.release-please.outputs.version }}"; exit 1; }

      - name: Build zip
        run: |
          cd custom_components
          zip -r ../smartir.zip smartir -x "*.pyc" "*/__pycache__/*"
          cd ..
          sha256sum smartir.zip > smartir.zip.sha256

      - name: Upload assets to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            smartir.zip
            smartir.zip.sha256
          fail_on_unmatched_files: true
