name: Security audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pip-audit:
    name: pip-audit (runtime deps)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit manifest.json requirements
        run: |
          jq -r '.requirements[]' custom_components/smartir/manifest.json > /tmp/reqs.txt
          if [ -s /tmp/reqs.txt ]; then
            pip-audit --requirement /tmp/reqs.txt --strict
          fi

  osv-scanner:
    name: OSV-Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      # Scan the integration's runtime dependencies only (from manifest.json),
      # matching the pip-audit job. The dev/test tooling is never shipped and
      # pulls Home Assistant's own pinned transitive deps, which we cannot
      # override; those are out of scope for a HACS integration's security audit.
      - name: Collect runtime requirements
        run: |
          mkdir -p .osv-runtime
          jq -r '.requirements[]' custom_components/smartir/manifest.json > .osv-runtime/requirements.txt
      - uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --recursive
            ./.osv-runtime

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
