name: Stale Issues

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Mark stale issues and PRs
        uses: actions/stale@v10
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "pinned,security,help wanted"
          exempt-pr-labels: "pinned,security"
          stale-issue-message: >
            Cette issue a été automatiquement marquée comme stale car elle n'a pas eu
            d'activité récente. Elle sera fermée dans 14 jours sans nouvelle activité.
            Merci pour votre contribution !
          stale-pr-message: >
            Cette PR a été automatiquement marquée comme stale car elle n'a pas eu
            d'activité récente. Elle sera fermée dans 14 jours sans nouvelle activité.
          close-issue-message: >
            Cette issue a été fermée automatiquement car elle est restée inactive
            trop longtemps. N'hésitez pas à la rouvrir si le problème persiste.
          close-pr-message: >
            Cette PR a été fermée automatiquement car elle est restée inactive
            trop longtemps. N'hésitez pas à la rouvrir si vous souhaitez continuer.
