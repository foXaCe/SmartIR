# Device-code data library is upstream data, not source — exclude from all hooks
exclude: '^(codes/|custom_components/smartir/codes/)'

ci:
  # mypy's env (homeassistant-stubs) exceeds pre-commit.ci's 250 MiB free tier;
  # it runs locally instead (see the mypy hook's stages: [manual]).
  skip: [mypy]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        additional_dependencies:
          - homeassistant-stubs
        args: [--ignore-missing-imports]
        files: ^custom_components/smartir/
        # Run manually (`prek run --hook-stage manual mypy`) until the
        # integration is fully typed — not blocking on every commit yet.
        stages: [manual]
